name: Bug
description: Something broken or behaving incorrectly
labels: ["bug"]
body:
  - type: textarea
    id: happened
    attributes:
      label: What happened
      description: Describe the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What was expected
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: "1. \n2. \n3. "
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser / OS / Version"
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Paste any relevant output, error messages, or screenshots.
